  - text: Currency
  - combobox "Currency"
  - button "Open"
  - heading "Locations Calendar 📍" [level=3]:
    - link "Locations Calendar 📍":
      - /url: http://127.0.0.1:5000/beancount/journal/
  - heading "Notes" [level=3]
  - paragraph:
    - text: Location data comes from Beancount events with
    - code: "type: \"location\""
    - text: and
    - code: description
    - text: as the location name, e.g.
    - code: /\d+-\d+-\d+ event "location" "London"/
    - text: .
  - paragraph: "Days in location are counted inclusively: both the start date and end date are included."
  - heading "Locations" [level=3]
  - grid:
    - row "Location Start Date End Date Days in Location":
      - columnheader "Location"
      - columnheader "Start Date"
      - columnheader "End Date"
      - columnheader "Days in Location"
    - rowgroup:
      - row /Home \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Home"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
      - row /Business trip \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Business trip"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
      - row /Home \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Home"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
      - row /Holiday \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Holiday"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
      - row /Home \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Home"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
      - row /Conference \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Conference"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
      - row /Home \d+-\d+-\d+ \d+-\d+-\d+ \d+/:
        - gridcell "Home"
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+-\d+-\d+/
        - gridcell /\d+/
  - paragraph: "Rows per page:"
  - 'combobox /Rows per page: \d+/'
  - paragraph: 1–7 of 7
  - button "Go to previous page" [disabled]
  - button "Go to next page" [disabled]
  - heading "Days by Location" [level=3]
  - heading "Travel Costs per Year 📅" [level=3]:
    - link "Travel Costs per Year 📅":
      - /url: http://127.0.0.1:5000/beancount/income_statement/?filter=%23travel
  - heading "Destinations ✈️" [level=3]:
    - link "Destinations ✈️":
      - /url: http://127.0.0.1:5000/beancount/income_statement/?filter=%23travel