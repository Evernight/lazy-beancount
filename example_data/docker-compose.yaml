services:
  lazybean:
    image: vandereer/lazy-beancount:latest
    # default values are valid for Mac setup, but prefer to run with
    # env UID=$(id -u) GID=$(id -g) docker compose up
    user: "${UID:-501}:${GID:-20}"
    ports:
      - "5003:5000"
      - "8101:8101"
      - "8777:8501"
    volumes:
      - .:/workspace
      # To use your own ledger instead of the example, uncomment below
      # and point to the directory containing your ledger.bean:
      # - /path/to/your/ledger:/workspace/ledger
    environment:
      - FAVA_PORT=5003
      - BEANCOUNT_IMPORT_PORT=8101
      - LAZY_BEANCOUNT_HOST=localhost
      - LAZY_BEANCOUNT_PORT=8777
      - MPLCONFIGDIR=/tmp/matplotlib-temp
